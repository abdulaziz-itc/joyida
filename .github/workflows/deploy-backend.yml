name: Deploy Backend to cPanel via FTP

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4

      - name: 🚀 Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: uz03.ahost.uz
          username: joidauz
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: backend/
          protocol: ftp
          port: 21
          dangerous-clean-slate: false # We don't want to delete venv and other files on server
