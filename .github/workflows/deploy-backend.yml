name: "BACKEND: 🐘 Auto-Deploy"

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚚 Checkout Repository
        uses: actions/checkout@v4

      - name: 🚀 Deploy Backend via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: uz03.ahost.uz
          username: joidauz
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./backend/
          server-dir: backend/
          protocol: ftp
          port: 21
          dangerous-clean-slate: false
          exclude: |
            venv/**
            venv_old/**
            **/__pycache__/**
            .git/**
            .github/**
            joyida.db
            app.db
 # We don't want to delete venv and other files on server
